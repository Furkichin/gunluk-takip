<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Habit.io">
<meta name="theme-color" content="#1C1B2E">
<title>Habit.io</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0EDE6;
  --dark: #1C1B2E;
  --panel: #ffffff;
  --text: #1C1B2E;
  --muted: #9B9B9B;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 10% 10%, rgba(255,107,107,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, rgba(167,139,250,0.07) 0%, transparent 50%);
}

/* LOADING OVERLAY */
#loadingOverlay {
  position: fixed; inset: 0;
  background: var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-size: 28px; font-weight: 800; color: white; margin-bottom: 8px; }
.loading-logo span { color: #A78BFA; }
.loading-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 32px; }
.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #A78BFA;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* SYNC INDICATOR */
#syncBadge {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--dark); color: white;
  font-size: 11px; font-weight: 600;
  padding: 7px 14px; border-radius: 20px;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  z-index: 999;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s, transform 0.3s;
}
#syncBadge.show { opacity: 1; transform: translateY(0); }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80;
}
.sync-dot.saving { background: #FDCB6E; animation: pulse 0.8s ease infinite; }
.sync-dot.error  { background: #FF6B6B; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── LAYOUT ── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  grid-row: 1 / 3;
  background: var(--dark);
  padding: 40px 28px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-logo { font-size: 22px; font-weight: 800; color: white; letter-spacing: -0.5px; margin-bottom: 6px; }
.sidebar-logo span { color: #A78BFA; }
.sidebar-date { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 36px; }
.sidebar-section-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; }
.sidebar-stat { margin-bottom: 22px; }
.sidebar-stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.sidebar-stat-name { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 500; }
.sidebar-stat-pct  { font-size: 13px; font-weight: 700; color: white; }
.progress-bar-bg   { height: 5px; border-radius: 10px; background: rgba(255,255,255,0.08); overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s cubic-bezier(.4,2,.6,1); }
.sidebar-divider   { height: 1px; background: rgba(255,255,255,0.07); margin: 24px 0; }

.streak-box { border-radius: 16px; padding: 16px 18px; transition: background 0.4s; }
.streak-box.state-none { background: linear-gradient(135deg,#74B9FF,#0984E3); }
.streak-box.state-low  { background: linear-gradient(135deg,#FDCB6E,#E17055); }
.streak-box.state-mid  { background: linear-gradient(135deg,#FF8E53,#FF6B35); }
.streak-box.state-high { background: linear-gradient(135deg,#FF4757,#FF6B6B); }
.streak-top  { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.streak-icon { font-size: 28px; line-height: 1; }
.streak-val  { font-size: 20px; font-weight: 800; color: white; }
.streak-msg  { font-size: 11px; color: rgba(255,255,255,0.72); line-height: 1.4; }
.sidebar-greet { margin-top: auto; padding-top: 30px; font-size: 12px; color: rgba(255,255,255,0.2); line-height: 1.6; }

/* TOP BAR */
.topbar {
  background: var(--panel);
  padding: 22px 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.topbar-title    { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.topbar-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
.topbar-rings    { display: flex; gap: 28px; align-items: center; }
.ring-group      { text-align: center; }
.ring-label      { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }

/* MAIN */
.main {
  padding: 32px 40px 40px;
  display: flex; flex-direction: column; gap: 20px;
  background: var(--bg);
}

/* AREA CHART */
.chart-card {
  background: white; border-radius: 20px;
  padding: 24px 28px 18px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.chart-title  { font-size: 15px; font-weight: 700; color: var(--text); }
.chart-sub    { font-size: 12px; color: var(--muted); margin-top: 2px; }
.chart-legend { display: flex; gap: 16px; align-items: center; }
.legend-item  { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 500; }
.legend-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chart-wrap   { position: relative; width: 100%; }
.chart-wrap svg { display: block; width: 100%; overflow: visible; }
.chart-days   { display: flex; justify-content: space-between; padding: 6px 4px 0; }
.chart-day-label { font-size: 10px; color: var(--muted); font-weight: 500; text-align: center; flex: 1; }
.chart-day-label.today { color: #A78BFA; font-weight: 700; }

/* HABIT CARDS */
.habit-card {
  background: white; border-radius: 20px;
  padding: 22px 28px;
  display: grid; grid-template-columns: 210px 1fr auto;
  align-items: center; gap: 28px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s, transform 0.2s;
  position: relative; overflow: hidden;
}
.habit-card:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.1); transform: translateY(-2px); }
.habit-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: 20px 0 0 20px;
}
.habit-card.sport::before  { background: linear-gradient(to bottom,#FF6B6B,#FF8E53); }
.habit-card.read::before   { background: linear-gradient(to bottom,#3ECFB2,#2BA8A0); }
.habit-card.guitar::before { background: linear-gradient(to bottom,#A78BFA,#6D28D9); }

.card-info { display: flex; align-items: center; gap: 16px; }
.card-emoji-wrap { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.sport  .card-emoji-wrap { background: #FF6B6B18; }
.read   .card-emoji-wrap { background: #3ECFB218; }
.guitar .card-emoji-wrap { background: #A78BFA18; }
.card-name  { font-size: 17px; font-weight: 700; color: var(--text); }
.card-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.card-badge { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.sport  .card-badge { background: #FF6B6B18; color: #FF6B6B; }
.read   .card-badge { background: #3ECFB218; color: #2BA8A0; }
.guitar .card-badge { background: #A78BFA18; color: #7C3AED; }

.week-row { display: flex; gap: 8px; align-items: center; }
.week-cell { text-align: center; }
.week-dot {
  width: 38px; height: 38px; border-radius: 10px; background: #F2F0EB;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 5px; border: 2px solid transparent;
  font-size: 13px; color: #ccc;
  transition: background 0.35s, box-shadow 0.35s, border-color 0.3s;
}
.week-dot.done { color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.18); }
.sport  .week-dot.done { background: linear-gradient(135deg,#FF6B6B,#FF8E53); }
.read   .week-dot.done { background: linear-gradient(135deg,#3ECFB2,#2BA8A0); }
.guitar .week-dot.done { background: linear-gradient(135deg,#A78BFA,#6D28D9); }
.week-dot.today { border-color: #A78BFA; }
.week-day       { font-size: 10px; color: var(--muted); font-weight: 500; }
.week-day.today { color: #A78BFA; font-weight: 700; }

.card-action     { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
.card-weekly-pct { font-size: 11px; color: var(--muted); font-weight: 500; }

.btn-wrap { position: relative; width: 110px; height: 40px; display: flex; align-items: center; justify-content: center; }
.btn-done {
  width: 110px; height: 40px; border-radius: 30px; border: none;
  font-size: 13px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; position: relative; z-index: 1;
  transition: transform 0.18s cubic-bezier(.4,2,.6,1), box-shadow 0.2s, background 0.25s, color 0.2s;
}
.btn-done.idle { color: white; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
.sport  .btn-done.idle { background: linear-gradient(135deg,#FF6B6B,#FF8E53); }
.read   .btn-done.idle { background: linear-gradient(135deg,#3ECFB2,#2BA8A0); }
.guitar .btn-done.idle { background: linear-gradient(135deg,#A78BFA,#6D28D9); }
.btn-done.active { background: #F0EDE6; color: #aaa; box-shadow: none; border: 1.5px solid #E0DDD6; }
.btn-done:hover  { transform: scale(1.06); }

.ripple {
  position: absolute; border-radius: 50%; transform: scale(0);
  animation: rippleOut 0.55s ease-out forwards; pointer-events: none; z-index: 0;
}
@keyframes rippleOut { to { transform: scale(3.5); opacity: 0; } }

.check-particle {
  position: fixed; pointer-events: none;
  font-size: 16px; font-weight: 800;
  z-index: 9999; user-select: none;
}

.anim-left { animation: fromLeft 0.55s ease both; }
.anim-top  { animation: fromTop  0.5s  ease both; }
.anim-up   { animation: fromUp   0.5s  ease both; }
@keyframes fromLeft { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes fromTop  { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fromUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loading-logo">Habit<span>.</span>io</div>
  <div class="loading-sub">Veriler yükleniyor...</div>
  <div class="loading-spinner"></div>
</div>

<!-- SYNC BADGE -->
<div id="syncBadge">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">Kaydedildi</span>
</div>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar anim-left">
    <div class="sidebar-logo">Habit<span>.</span>io</div>
    <div class="sidebar-date" id="sideDate"></div>
    <div class="sidebar-section-label">Haftalık İlerleme</div>
    <div id="sidebarStats"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Seri</div>
    <div class="streak-box state-none" id="streakBox">
      <div class="streak-top">
        <div class="streak-icon" id="streakIcon">💧</div>
        <div class="streak-val"  id="streakVal">0 gün</div>

    </div>

      <div class="ring-group">
        <div class="ring-label">Bugün</div>
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="28" fill="none" stroke="#EDE9E3" stroke-width="7"/>
          <circle id="todayArc" cx="36" cy="36" r="28" fill="none" stroke="#3ECFB2" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9"

          <text id="todayPct" x="36" y="40" text-anchor="middle" fill="#1C1B2E" font-size="13" font-weight="800" font-family="DM Sans,sans-serif">0%</text>
        </svg>
      </div>
      <div class="ring-group">
        <div class="ring-label">Bu Hafta</div>
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="28" fill="none" stroke="#EDE9E3" stroke-width="7"/>
          <circle id="weeklyArc" cx="36" cy="36" r="28" fill="none" stroke="#A78BFA" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9"
            transform="rotate(-90 36 36)" style="transition:stroke-dashoffset 0.7s cubic-bezier(.4,2,.6,1)"/>
          <text id="weeklyPct" x="36" y="40" text-anchor="middle" fill="#1C1B2E" font-size="13" font-weight="800" font-family="DM Sans,sans-serif">0%</text>

  <!-- MAIN -->

        </div>

      </div>

    </div>
    <div id="mainCards" style="display:flex;flex-direction:column;gap:20px;"></div>
  </main>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── FIREBASE CONFIG ── */
const firebaseConfig = {
  apiKey:            "AIzaSyB_LIvcHXc1xyeIs-je-553eUx1OlkPfLc",
  authDomain:        "habit-tracker-d7407.firebaseapp.com",
  projectId:         "habit-tracker-d7407",
  storageBucket:     "habit-tracker-d7407.firebasestorage.app",
  messagingSenderId: "714661260498",
  appId:             "1:714661260498:web:1679708c65f3af979ed10b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ── STATE ── */
const rawDay  = new Date().getDay();
const TODAY_I = rawDay === 0 ? 6 : rawDay - 1;
const DAYS    = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

// Haftanın Pazartesi tarihini key olarak kullan → her hafta ayrı belge
function getWeekKey() {
  const now  = new Date();
  const day  = now.getDay() === 0 ? 7 : now.getDay(); // Pzt=1 .. Paz=7
  const diff = now.getDate() - day + 1;
  const mon  = new Date(now.setDate(diff));
  return mon.toISOString().slice(0, 10); // "2025-03-03"
}
const WEEK_KEY = getWeekKey();
const DOC_REF  = doc(db, 'weeks', WEEK_KEY);

const HABITS = [
  { id:'sport',  cls:'sport',  name:'Spor',  emoji:'🏋️', desc:'Egzersiz & hareket', color:'#FF6B6B', week:[0,0,0,0,0,0,0] },
  { id:'read',   cls:'read',   name:'Okuma', emoji:'📚', desc:'Kitap & öğrenme',    color:'#3ECFB2', week:[0,0,0,0,0,0,0] },
  { id:'guitar', cls:'guitar', name:'Gitar', emoji:'🎸', desc:'Pratik & ezber',     color:'#A78BFA', week:[0,0,0,0,0,0,0] },
];

let saveTimeout = null;

/* ── SYNC BADGE ── */
let badgeTimer = null;
function showSync(state) { // 'saving' | 'saved' | 'error'
  const badge = document.getElementById('syncBadge');
  const dot   = document.getElementById('syncDot');
  const text  = document.getElementById('syncText');
  clearTimeout(badgeTimer);
  badge.classList.add('show');
  dot.className = 'sync-dot' + (state === 'saving' ? ' saving' : state === 'error' ? ' error' : '');
  text.textContent = state === 'saving' ? 'Kaydediliyor...' : state === 'error' ? 'Bağlantı hatası' : 'Kaydedildi ✓';
  if (state !== 'saving') badgeTimer = setTimeout(() => badge.classList.remove('show'), 2500);
}

/* ── FIREBASE LOAD + REALTIME LISTEN ── */
async function initFirebase() {
  try {
    // İlk yükleme
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) applyData(snap.data());
    hideLoading();

    // Gerçek zamanlı dinle — telefon veya başka sekme değişince anında günceller
    onSnapshot(DOC_REF, (snap) => {
      if (snap.exists() && !snap.metadata.hasPendingWrites) {
        applyData(snap.data());
        refreshAll();
      }
    });
  } catch (e) {
    console.error(e);
    hideLoading();
  }
}

function applyData(data) {
  HABITS.forEach(h => {
    if (data[h.id]) h.week = data[h.id];
  });
}

function hideLoading() {
  const ov = document.getElementById('loadingOverlay');
  ov.classList.add('hidden');
  setTimeout(() => ov.remove(), 500);
}

/* ── SAVE TO FIREBASE (debounced) ── */
function saveToFirebase() {
  showSync('saving');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      const payload = {};
      HABITS.forEach(h => { payload[h.id] = h.week; });
      await setDoc(DOC_REF, payload);
      showSync('saved');
    } catch (e) {
      showSync('error');
    }
  }, 600);
}

/* ── STATIC INIT ── */
function initStatic() {
  const now = new Date();
  const h   = now.getHours();
  document.getElementById('sideDate').textContent =
    now.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
  document.getElementById('topSubtitle').textContent =
    now.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('sideGreet').textContent =
    h<12 ? '☀️ Günaydın! Harika bir gün seni bekliyor.' :
    h<18 ? '🌤️ İyi günler! Devam etmek için mükemmel bir zaman.' :
           '🌙 İyi akşamlar! Bugünü güçlü bitir.';
  document.getElementById('chartDays').innerHTML =
    DAYS.map((d,i) => `<div class="chart-day-label${i===TODAY_I?' today':''}">${d}</div>`).join('');
}

/* ── AREA CHART ── */
function buildAreaChart() {
  const svg = document.getElementById('areaChart');
  const W=640, H=140, padL=4, padR=4, padT=16, padB=4;
  const innerW=W-padL-padR, innerH=H-padT-padB, n=7, step=innerW/(n-1);
  const maxVal = HABITS.length;

  function dayTotal(i) {
    if (i > TODAY_I) return null;
    return HABITS.reduce((s,h) => s+(h.week[i]?1:0), 0);
  }
  const vals = DAYS.map((_,i) => dayTotal(i));

  function xOf(i) { return padL + i*step; }
  function yOf(v) { return padT + innerH - (v/maxVal)*innerH; }

  function smoothPath(pts) {
    if (pts.length < 2) return '';
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i=0;i<pts.length-1;i++) {
      const [x0,y0]=pts[i],[x1,y1]=pts[i+1], cx=(x0+x1)/2;
      d += ` C ${cx} ${y0} ${cx} ${y1} ${x1} ${y1}`;
    }
    return d;
  }

  const known = vals.map((v,i) => v!==null?[xOf(i),yOf(v)]:null).filter(Boolean);
  const line  = smoothPath(known);
  const area  = known.length>0 ? line+` L ${known[known.length-1][0]} ${padT+innerH} L ${known[0][0]} ${padT+innerH} Z` : '';

  let grid='';
  for (let v=0;v<=maxVal;v++) {
    const y=yOf(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#F0EDE6" stroke-width="1"/>`;
    if(v>0) grid += `<text x="${padL-2}" y="${y+3}" text-anchor="end" font-size="9" fill="#ccc" font-family="DM Sans,sans-serif">${v}</text>`;
  }

  let dots='';
  known.forEach(([x,y],ki) => {
    const v=vals[ki], isToday=ki===TODAY_I;
    dots += `<circle cx="${x}" cy="${y}" r="${isToday?5:3.5}" fill="${isToday?'#A78BFA':'#1C1B2E'}" stroke="white" stroke-width="2"/>`;
    if(isToday) dots += `<circle cx="${x}" cy="${y}" r="9" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>`;
    if(v>0) dots += `<text x="${x}" y="${y-9}" text-anchor="middle" font-size="10" font-weight="700" fill="#1C1B2E" font-family="DM Sans,sans-serif">${v}</text>`;
  });

  let future='';
  if (TODAY_I<n-1 && known.length>0) {
    const lk=known[known.length-1];
    let fp=`M ${lk[0]} ${lk[1]}`;
    for(let i=TODAY_I+1;i<n;i++) fp+=` L ${xOf(i)} ${lk[1]}`;
    future=`<path d="${fp}" fill="none" stroke="#D0CCC4" stroke-width="1.5" stroke-dasharray="4 4"/>`;
  }

  svg.innerHTML = `<defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.02"/>
    </linearGradient></defs>` +
    grid +
    (area ? `<path d="${area}" fill="url(#areaGrad)"/>` : '') +
    (line ? `<path d="${line}" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` : '') +
    future + dots;
}

/* ── BUILD CARDS (once) ── */
function buildCards() {
  const container = document.getElementById('mainCards');
  container.innerHTML = '';
  HABITS.forEach((h, idx) => {
    const card = document.createElement('div');
    card.className = `habit-card ${h.cls} anim-up`;
    card.style.animationDelay = (0.1+idx*0.08)+'s';
    card.id = 'card-'+h.id;
    card.innerHTML = `
      <div class="card-info">
        <div class="card-emoji-wrap">${h.emoji}</div>
        <div>
          <div class="card-name">${h.name}</div>
          <div class="card-desc">${h.desc}</div>
          <div class="card-badge" id="badge-${h.id}">⚡ Başla!</div>
        </div>
      </div>
      <div class="week-row" id="week-${h.id}"></div>
      <div class="card-action">
        <div class="btn-wrap">
          <button class="btn-done idle" id="btn-${h.id}">Yaptım!</button>
        </div>
        <div class="card-weekly-pct" id="wpct-${h.id}">Haftalık: 0%</div>
      </div>`;
    container.appendChild(card);

    card.querySelector('#btn-'+h.id).addEventListener('click', function(e) {
      const prev = h.week[TODAY_I];
      h.week[TODAY_I] = prev ? 0 : 1;
      if (!prev) { rippleEffect(this, h.color); checkBurst(e, h.color); }
      refreshCard(h);
      refreshGlobal();
      buildAreaChart();
      saveToFirebase();
    });
  });
  HABITS.forEach(h => refreshCard(h));
}

/* ── REFRESH CARD ── */
function refreshCard(h) {
  const todayDone = !!h.week[TODAY_I];
  const weekDone  = h.week.reduce((s,v)=>s+(v?1:0),0);
  const weekPct   = Math.round((weekDone/7)*100);
  let cs=0; for(let i=TODAY_I;i>=0;i--){if(h.week[i])cs++;else break;}

  document.getElementById('badge-'+h.id).textContent = cs>0?'🔥 '+cs+' günlük seri':'⚡ Başla!';
  document.getElementById('wpct-'+h.id).textContent  = 'Haftalık: '+weekPct+'%';
  const btn = document.getElementById('btn-'+h.id);
  btn.textContent = todayDone?'✓ Tamam!':'Yaptım!';
  btn.className   = 'btn-done '+(todayDone?'active':'idle');
  document.getElementById('week-'+h.id).innerHTML = DAYS.map((d,i)=>`
    <div class="week-cell">
      <div class="week-dot${h.week[i]?' done':''}${i===TODAY_I?' today':''}">${h.week[i]?'✓':''}</div>
      <div class="week-day${i===TODAY_I?' today':''}">${d}</div>
    </div>`).join('');
}

/* ── REFRESH ALL ── */
function refreshAll() {
  HABITS.forEach(h => refreshCard(h));
  refreshGlobal();
  buildAreaChart();
}

/* ── REFRESH GLOBAL ── */
function refreshGlobal() {
  const circ=175.9;
  const td=HABITS.filter(h=>h.week[TODAY_I]).length;
  const tp=Math.round((td/HABITS.length)*100);
  document.getElementById('todayArc').style.strokeDashoffset=circ-(tp/100)*circ;
  document.getElementById('todayPct').textContent=tp+'%';

  const de=TODAY_I+1, mp=HABITS.length*de;
  let wd=0; HABITS.forEach(h=>{for(let i=0;i<=TODAY_I;i++)if(h.week[i])wd++;});
  const wp=mp>0?Math.round((wd/mp)*100):0;
  document.getElementById('weeklyArc').style.strokeDashoffset=circ-(wp/100)*circ;
  document.getElementById('weeklyPct').textContent=wp+'%';

  document.getElementById('sidebarStats').innerHTML=HABITS.map(h=>{
    const wd=h.week.reduce((s,v)=>s+(v?1:0),0), pct=Math.round((wd/7)*100);
    return `<div class="sidebar-stat">
      <div class="sidebar-stat-row">
        <span class="sidebar-stat-name">${h.emoji} ${h.name}</span>
        <span class="sidebar-stat-pct">${pct}%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%;background:${h.color}"></div>
      </div></div>`;
  }).join('');

  document.getElementById('topTitle').textContent = tp===100?'🎉 Bugünü tamamladın!':'Bugünkü Görevler';

  let gs=0; for(let i=TODAY_I;i>=0;i--){if(HABITS.every(h=>h.week[i]))gs++;else break;}
  let bi=0; HABITS.forEach(h=>{let s=0;for(let i=TODAY_I;i>=0;i--){if(h.week[i])s++;else break;}bi=Math.max(bi,s);});
  const sv=gs>0?gs:bi;
  document.getElementById('streakBox').className='streak-box '+(sv===0?'state-none':sv<3?'state-low':sv<7?'state-mid':'state-high');
  const rows=[[0,'💧','0 gün','Bugün başla, yarın 1 günlük seride olursun!'],[1,'⚡','1 gün','İyi başlangıç! Yarın da devam et.'],[4,'🌟',sv+' gün','Momentum kazanıyorsun! Bozma.'],[7,'🔥',sv+' gün',sv+' gün! Durdurulamıyorsun 🔥'],[Infinity,'🏆',sv+' gün','Efsane! '+sv+' gün kesintisiz 💪']];
  const row=rows.find(([t])=>sv<=t)||rows[rows.length-1];
  document.getElementById('streakIcon').textContent=row[1];
  document.getElementById('streakVal').textContent=row[2];
  document.getElementById('streakMsg').textContent=row[3];
}

/* ── ANIMATIONS ── */
function rippleEffect(btn, color) {
  const wrap=btn.parentElement;
  const r=document.createElement('div'); r.className='ripple';
  const size=Math.max(wrap.offsetWidth,wrap.offsetHeight);
  r.style.cssText=`width:${size}px;height:${size}px;left:${(wrap.offsetWidth-size)/2}px;top:${(wrap.offsetHeight-size)/2}px;background:${color}44;`;
  wrap.appendChild(r); setTimeout(()=>r.remove(),600);
}

function checkBurst(e, color) {
  const count=6, symbols=['✓','✓','✓','✔','✔','★'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div'); el.className='check-particle';
    const angle=(i/count)*Math.PI*2-Math.PI/2, dist=30+Math.random()*30;
    el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    el.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;color:${color};`;
    document.body.appendChild(el);
    let start=null; const dur=750+i*40;
    function animate(ts){
      if(!start)start=ts;
      const p=Math.min((ts-start)/dur,1), ease=1-Math.pow(1-p,3);
      el.style.transform=`translate(${Math.cos(angle)*dist*ease}px,${(Math.sin(angle)*dist-60)*ease}px) scale(${1+ease*0.3})`;
      el.style.opacity=p<0.6?'1':''+(1-(p-0.6)/0.4);
      if(p<1)requestAnimationFrame(animate); else el.remove();
    }
    setTimeout(()=>requestAnimationFrame(animate),i*45);
  }
}

/* ── BOOT ── */
initStatic();
buildCards();
buildAreaChart();
refreshGlobal();
initFirebase();
</script>
</body>
